name: GrantPulse CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Secret Exposure Audits
        run: |
          # Scanning files to prevent accidental exposure of active keys before compiling
          if grep -q "sk-proj-" $(find . -type f -not -path "*/.git/*" -not -path "*/node_modules/*"); then
            echo "CRITICAL SECURITY ERROR: OpenAI Secret Key signature found in plain text!"
            exit 1
          fi

      - name: Run Phase 3 Validation Unit Tests
        run: npm run test